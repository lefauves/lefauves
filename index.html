<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fauves</title>
  <meta name="description" content="Brilliant art bends time." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Pinyon+Script&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #F0629C;
      --black:  #0A0A0A;
      --green:  #52C41A;
      --yellow: #FFD600;
      --red:    #FF1F00;
      --blue:   #1E6FFF;
      --white:  #FFFFFF;
    }

    html, body {
      height: 100%;
      background: var(--pink);
      color: var(--black);
      font-family: 'Bebas Neue', sans-serif;
      overflow: hidden;
    }

    /* ── Blobs (painting-inspired background shapes) ── */
    .blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      mix-blend-mode: multiply;
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 380px; height: 380px;
      background: var(--black);
      top: -80px; left: -100px;
      animation-duration: 14s;
    }
    .blob-2 {
      width: 260px; height: 300px;
      background: var(--green);
      bottom: -60px; right: -40px;
      animation-duration: 10s;
      animation-delay: -4s;
      opacity: 0.35;
    }
    .blob-3 {
      width: 180px; height: 180px;
      background: var(--yellow);
      top: 30%; right: 8%;
      animation-duration: 16s;
      animation-delay: -8s;
      opacity: 0.4;
    }
    .blob-4 {
      width: 120px; height: 120px;
      background: var(--red);
      bottom: 25%; left: 6%;
      animation-duration: 9s;
      animation-delay: -2s;
      opacity: 0.25;
    }
    .blob-5 {
      width: 90px; height: 90px;
      background: var(--blue);
      top: 15%; left: 30%;
      animation-duration: 18s;
      animation-delay: -6s;
      opacity: 0.3;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.06); }
    }

    /* ── Main layout ── */
    .stage {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 0;
    }

    /* ── Signature ── */
    .signature-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: 0.1s;
    }
    .signature {
      font-family: 'Pinyon Script', cursive;
      font-size: clamp(5rem, 18vw, 13rem);
      line-height: 1;
      color: var(--black);
      letter-spacing: -0.01em;
    }
    .signature-line {
      display: block;
      width: 110%;
      height: 3px;
      background: var(--black);
      margin-top: 0.2em;
      transform-origin: left;
      animation: lineGrow 0.8s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: 0.6s;
    }
    @keyframes lineGrow {
      from { transform: scaleX(0); opacity: 0; }
      to   { transform: scaleX(1); opacity: 1; }
    }

    /* ── Under construction ── */
    .label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(0.65rem, 1.8vw, 0.9rem);
      letter-spacing: 0.4em;
      color: var(--black);
      opacity: 0.5;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      animation: fadeUp 0.8s ease both;
      animation-delay: 0.4s;
    }
    .under-construction {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 10vw, 8rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--black);
      animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: 0.7s;
    }

    /* ── Tagline ── */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.1rem, 3vw, 1.9rem);
      color: var(--black);
      opacity: 0.75;
      margin-top: 1.2rem;
      letter-spacing: 0.01em;
      animation: fadeUp 0.8s ease both;
      animation-delay: 0.95s;
    }

    /* ── Instagram link ── */
    .ig-link {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--black);
      opacity: 0.45;
      text-decoration: none;
      text-transform: uppercase;
      transition: opacity 0.3s;
      animation: fadeUp 0.8s ease both;
      animation-delay: 1.2s;
    }
    .ig-link:hover { opacity: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .blobs { display: none; }
      .blob-2, .blob-3 { display: block; }
    }
  </style>
</head>
<body>

  <div class="blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="blob blob-5"></div>
  </div>

  <main class="stage">
    <p class="label">↓</p>
    <div class="signature-wrap">
      <span class="signature">Fauves</span>
      <span class="signature-line"></span>
    </div>
    <p class="label">Under Construction</p>
    <h1 class="under-construction">Under Construction</h1>
    <p class="tagline">Brilliant art bends time.</p>
  </main>

  <a class="ig-link" href="https://www.instagram.com/lefauves/" target="_blank" rel="noopener">
    @lefauves ↗
  </a>

</body>
</html>
