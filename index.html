<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fauves</title>
  <meta name="description" content="Brilliant art bends time." />
  <link rel="icon" type="image/svg+xml" href="assets/icon/fauves-favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@1,300&family=Finger+Paint&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
    }

    /* ══════════════════════════════════════════
       BACKGROUND ART LAYERS
       All 6 paintings scattered + animated.
       mix-blend-mode: screen → dark outlines
       dissolve into black, vivid colors glow.
    ══════════════════════════════════════════ */
    .bg-layers {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-paint {
      position: absolute;
      object-fit: contain;
      mix-blend-mode: screen;
    }

    /* Each painting: unique position, scale, rotation, opacity, timing */
    .p1 {
      width: 62vw;
      top: -12vh; left: -18vw;
      transform: rotate(-11deg);
      opacity: 0.22;
      animation: floatA 22s ease-in-out infinite;
    }
    .p2 {
      width: 48vw;
      top: 8vh; right: -14vw;
      transform: rotate(9deg);
      opacity: 0.18;
      animation: floatB 17s ease-in-out infinite;
    }
    .p3 {
      width: 44vw;
      top: 42vh; left: 8vw;
      transform: rotate(-4deg);
      opacity: 0.16;
      animation: floatC 25s ease-in-out infinite;
    }
    .p4 {
      width: 56vw;
      bottom: -18vh; right: -8vw;
      transform: rotate(14deg);
      opacity: 0.20;
      animation: floatD 19s ease-in-out infinite;
    }
    .p5 {
      width: 38vw;
      bottom: 2vh; left: -8vw;
      transform: rotate(-17deg);
      opacity: 0.15;
      animation: floatE 28s ease-in-out infinite;
    }
    .p6 {
      width: 52vw;
      top: 18vh; left: 22vw;
      transform: rotate(5deg);
      opacity: 0.14;
      animation: floatF 21s ease-in-out infinite;
    }

    @keyframes floatA {
      0%,100% { transform: rotate(-11deg) translate(0, 0) scale(1); }
      33%      { transform: rotate(-9deg)  translate(18px, 22px) scale(1.02); }
      66%      { transform: rotate(-13deg) translate(-12px, 10px) scale(0.98); }
    }
    @keyframes floatB {
      0%,100% { transform: rotate(9deg)   translate(0, 0) scale(1); }
      40%      { transform: rotate(11deg)  translate(-20px, 15px) scale(1.03); }
      70%      { transform: rotate(7deg)   translate(10px, -18px) scale(0.97); }
    }
    @keyframes floatC {
      0%,100% { transform: rotate(-4deg)  translate(0, 0) scale(1); }
      50%      { transform: rotate(-6deg)  translate(15px, -20px) scale(1.04); }
    }
    @keyframes floatD {
      0%,100% { transform: rotate(14deg)  translate(0, 0) scale(1); }
      45%      { transform: rotate(16deg)  translate(-15px, 12px) scale(1.02); }
      80%      { transform: rotate(12deg)  translate(8px, -10px) scale(0.99); }
    }
    @keyframes floatE {
      0%,100% { transform: rotate(-17deg) translate(0, 0) scale(1); }
      30%      { transform: rotate(-14deg) translate(20px, -15px) scale(1.03); }
      70%      { transform: rotate(-19deg) translate(-8px, 18px) scale(0.97); }
    }
    @keyframes floatF {
      0%,100% { transform: rotate(5deg)   translate(0, 0) scale(1); }
      55%      { transform: rotate(3deg)   translate(-18px, 22px) scale(1.02); }
    }

    /* ══════════════════════════════════════════
       PROFILE PAINTING
       Featured artwork — floats above layers,
       partly transparent so layers show through.
    ══════════════════════════════════════════ */
    .profile-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -68%) rotate(2deg);
      width: min(38vh, 42vw);
      z-index: 2;
      pointer-events: none;
      animation: profileFloat 14s ease-in-out infinite;
    }
    .profile-img {
      width: 100%;
      height: auto;
      display: block;
      opacity: 0.82;
      mix-blend-mode: screen;
      filter: saturate(1.3) contrast(1.05);
    }
    @keyframes profileFloat {
      0%,100% { transform: translate(-50%, -68%) rotate(2deg) scale(1); }
      50%      { transform: translate(-50%, -71%) rotate(0.5deg) scale(1.02); }
    }

    /* ══════════════════════════════════════════
       VIGNETTE — keeps center readable
    ══════════════════════════════════════════ */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 55% at 50% 50%,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0.55) 70%,
        rgba(0,0,0,0.85) 100%);
      pointer-events: none;
      z-index: 3;
    }

    /* ══════════════════════════════════════════
       STAGE — centered text
    ══════════════════════════════════════════ */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: clamp(3rem, 10vh, 7rem);
      text-align: center;
      z-index: 4;
      pointer-events: none;
      gap: 0;
    }

    /* "le fauves" in Finger Paint */
    .logo {
      font-family: 'Finger Paint', cursive;
      font-size: clamp(2.8rem, 10vw, 7.5rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1;
      color: #fff;
      text-shadow:
        0 0 30px rgba(255,255,255,0.3),
        0 0 60px rgba(240,98,154,0.25),
        2px 2px 0 rgba(0,0,0,0.8);
      animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: 0.1s;
      margin-bottom: 0.5rem;
    }

    /* Signature underline */
    .sig-line {
      width: clamp(180px, 35vw, 420px);
      height: 2px;
      background: linear-gradient(to right, transparent, #fff 20%, #fff 80%, transparent);
      box-shadow: 0 0 10px rgba(255,255,255,0.35);
      margin-bottom: 1.4rem;
      transform-origin: center;
      animation: lineGrow 0.9s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: 0.55s;
    }
    @keyframes lineGrow {
      from { transform: scaleX(0); opacity: 0; }
      to   { transform: scaleX(1); opacity: 1; }
    }

    /* Under Construction — split animation */
    .under {
      display: flex;
      gap: 0.3em;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1rem, 3.5vw, 2.6rem);
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.8);
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      margin-bottom: 0.6rem;
      overflow: visible;
    }
    .under-left  { display: inline-block; animation: fromLeft  6s cubic-bezier(0.4,0,0.2,1) infinite; }
    .under-right { display: inline-block; animation: fromRight 6s cubic-bezier(0.4,0,0.2,1) infinite; }

    @keyframes fromLeft {
      0%   { transform: translateX(-110vw); opacity: 0; }
      18%  { transform: translateX(0);      opacity: 1; }
      62%  { transform: translateX(0);      opacity: 1; }
      80%  { transform: translateX(0);      opacity: 0; }
      100% { transform: translateX(-110vw); opacity: 0; }
    }
    @keyframes fromRight {
      0%   { transform: translateX(110vw);  opacity: 0; }
      18%  { transform: translateX(0);      opacity: 1; }
      62%  { transform: translateX(0);      opacity: 1; }
      80%  { transform: translateX(0);      opacity: 0; }
      100% { transform: translateX(110vw);  opacity: 0; }
    }

    /* Tagline */
    .tagline {
      font-family: 'Finger Paint', cursive;
      font-size: clamp(0.8rem, 2vw, 1.2rem);
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.02em;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      animation: fadeUp 0.9s ease both;
      animation-delay: 0.6s;
      margin-bottom: 1.8rem;
    }

    /* IG link with icon */
    .ig-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      pointer-events: all;
      transition: color 0.3s, gap 0.3s;
      animation: fadeUp 0.9s ease both;
      animation-delay: 0.8s;
    }
    .ig-link:hover { color: rgba(255,255,255,0.9); gap: 0.75rem; }
    .ig-link svg {
      width: 18px; height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .profile-wrap { width: min(45vh, 70vw); }
      .stage { padding-bottom: clamp(2rem, 6vh, 4rem); }
    }
  </style>
</head>
<body>

  <!-- ── Background art layers ── -->
  <div class="bg-layers" aria-hidden="true">
    <img class="bg-paint p1" src="assets/paintings/painting1.png" alt="" />
    <img class="bg-paint p2" src="assets/paintings/painting2.png" alt="" />
    <img class="bg-paint p3" src="assets/paintings/painting3.png" alt="" />
    <img class="bg-paint p4" src="assets/paintings/painting4.png" alt="" />
    <img class="bg-paint p5" src="assets/paintings/painting5.png" alt="" />
    <img class="bg-paint p6" src="assets/paintings/painting6.png" alt="" />
  </div>

  <!-- ── Profile painting (featured) ──
       Currently using painting1.png.
       Change the src below if a different painting should be featured.
  ── -->
  <div class="profile-wrap" aria-hidden="true">
    <img class="profile-img" src="assets/paintings/painting1.png" alt="" />
  </div>

  <!-- ── Vignette ── -->
  <div class="vignette" aria-hidden="true"></div>

  <!-- ── Main content ── -->
  <main class="stage">
    <h1 class="logo">le fauves</h1>
    <div class="sig-line"></div>
    <p class="under">
      <span class="under-left">Under</span>
      <span class="under-right">Construction</span>
    </p>
    <p class="tagline">brilliant art bends time.</p>
    <a class="ig-link" href="https://www.instagram.com/lefauves/" target="_blank" rel="noopener">
      <!-- Instagram icon -->
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="5"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
      @lefauves
    </a>
  </main>

</body>
</html>
