<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fauves</title>
  <meta name="description" content="Brilliant art bends time." />
  <link rel="icon" type="image/svg+xml" href="assets/icon/fauves-favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@1,300&family=Pinyon+Script&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
    }

    /* ── Floating art canvases ── */
    .art-layer {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      will-change: transform, opacity;
    }

    /* ── Centered content ── */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }

    /* Subtle vignette keeps text readable over art */
    .stage::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 70% at 50% 50%,
        rgba(0,0,0,0.15) 0%,
        rgba(0,0,0,0.65) 100%);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Signature ── */
    .signature-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.2rem;
      animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: 0.15s;
    }
    .signature {
      font-family: 'Pinyon Script', cursive;
      font-size: clamp(5.5rem, 20vw, 14rem);
      line-height: 1;
      color: #fff;
      text-shadow:
        0 0 40px rgba(255,255,255,0.25),
        0 0 80px rgba(255,255,255,0.1);
    }
    .signature-line {
      display: block;
      width: 108%;
      height: 2.5px;
      background: #fff;
      margin-top: 0.15em;
      transform-origin: left;
      box-shadow: 0 0 12px rgba(255,255,255,0.4);
      animation: lineGrow 1s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: 0.7s;
    }
    @keyframes lineGrow {
      from { transform: scaleX(0); opacity: 0; }
      to   { transform: scaleX(1); opacity: 1; }
    }

    /* ── Under Construction ── */
    .under-construction {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 7.5vw, 6.5rem);
      letter-spacing: 0.06em;
      line-height: 1;
      color: #fff;
      text-shadow: 0 0 30px rgba(255,255,255,0.15);
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: 0.5s;
    }

    /* ── Tagline ── */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 2.8vw, 1.75rem);
      color: rgba(255,255,255,0.65);
      margin-top: 1rem;
      letter-spacing: 0.02em;
      animation: fadeUp 0.9s ease both;
      animation-delay: 0.8s;
    }

    /* ── IG link ── */
    .ig-link {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      text-transform: uppercase;
      pointer-events: all;
      transition: color 0.3s;
      z-index: 20;
      animation: fadeUp 0.9s ease both;
      animation-delay: 1.1s;
    }
    .ig-link:hover { color: rgba(255,255,255,0.85); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Art layers injected by JS -->

  <div class="stage">
    <div class="content">
      <div class="signature-wrap">
        <span class="signature">Fauves</span>
        <span class="signature-line"></span>
      </div>
      <h1 class="under-construction">Under Construction</h1>
      <p class="tagline">Brilliant art bends time.</p>
    </div>
  </div>

  <a class="ig-link" href="https://www.instagram.com/lefauves/" target="_blank" rel="noopener">@lefauves ↗</a>

  <script>
    /* ──────────────────────────────────────────────────────────
       Art layer config
       4 copies of the painting: different scale, speed, drift.
    ────────────────────────────────────────────────────────── */
    const LAYERS = [
      { id: 'l0', scale: 0.85, rotSpeed:  0.00055, phase: 0,              driftX: 55,  driftY: 35,  baseOpacity: 0.60 },
      { id: 'l1', scale: 0.52, rotSpeed: -0.00038, phase: Math.PI,        driftX: -45, driftY: 55,  baseOpacity: 0.40 },
      { id: 'l2', scale: 0.38, rotSpeed:  0.00090, phase: Math.PI / 2,    driftX: 30,  driftY: -45, baseOpacity: 0.28 },
      { id: 'l3', scale: 0.65, rotSpeed: -0.00062, phase: Math.PI * 1.5,  driftX: -60, driftY: -28, baseOpacity: 0.48 },
    ];

    /* Pink color to remove (sampled from painting background ~#F0629C) */
    const PINK = { r: 238, g: 96, b: 154 };
    const TOLERANCE = 62; /* pixels within this Euclidean distance → removed */

    /* ── Strip the pink background from image data ── */
    function stripPink(data) {
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i + 1], b = data[i + 2];
        const d = Math.sqrt((r - PINK.r) ** 2 + (g - PINK.g) ** 2 + (b - PINK.b) ** 2);
        if (d < TOLERANCE) {
          /* feather edge: closer to target = more transparent */
          const ratio = d / TOLERANCE;
          data[i + 3] = Math.floor(ratio * ratio * data[i + 3] * 0.5);
        }
      }
    }

    /* ── Set up canvases once image is processed ── */
    function buildLayers(stripped) {
      const aspect = stripped.width / stripped.height;

      LAYERS.forEach((cfg, idx) => {
        const canvas = document.createElement('canvas');
        canvas.className = 'art-layer';
        canvas.width  = stripped.width;
        canvas.height = stripped.height;
        canvas.id = cfg.id;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(stripped, 0, 0);

        /* Size via CSS so GPU handles scaling */
        const longEdge = Math.max(window.innerWidth, window.innerHeight) * cfg.scale;
        canvas.style.width  = `${longEdge * aspect}px`;
        canvas.style.height = `${longEdge}px`;
        canvas.style.opacity = cfg.baseOpacity;

        document.body.insertBefore(canvas, document.body.firstChild);
        cfg.canvas = canvas;
        cfg.rot = idx * (Math.PI / LAYERS.length); /* stagger initial rotations */
      });

      requestAnimationFrame(tick);
    }

    /* ── Animation loop ── */
    function tick(ts) {
      const t = ts * 0.001;

      LAYERS.forEach(cfg => {
        if (!cfg.canvas) return;

        cfg.rot += cfg.rotSpeed;

        const x  = Math.sin(t * 0.28 + cfg.phase) * cfg.driftX;
        const y  = Math.cos(t * 0.19 + cfg.phase) * cfg.driftY;
        const op = cfg.baseOpacity + Math.sin(t * 0.35 + cfg.phase) * 0.14;

        cfg.canvas.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) rotate(${cfg.rot}rad)`;
        cfg.canvas.style.opacity   = Math.max(0.08, Math.min(0.85, op));
      });

      requestAnimationFrame(tick);
    }

    /* ── Load painting ──────────────────────────────────────
       Drop the painting image into:  assets/painting.jpg
       (or .png / .webp — just update IMG_SRC below)
    ──────────────────────────────────────────────────────── */
    const IMG_SRC = 'assets/paintings/painting6.png';

    const img = new Image();
    img.onload = () => {
      /* Process on offscreen canvas */
      const off = document.createElement('canvas');
      off.width  = img.naturalWidth;
      off.height = img.naturalHeight;
      const ctx = off.getContext('2d');
      ctx.drawImage(img, 0, 0);

      const imageData = ctx.getImageData(0, 0, off.width, off.height);
      stripPink(imageData.data);
      ctx.putImageData(imageData, 0, 0);

      buildLayers(off);
    };
    img.onerror = () => {
      /* No image yet — page still looks fine */
      console.info('Add the painting to assets/painting.jpg to enable art layers.');
    };
    img.src = IMG_SRC;
  </script>
</body>
</html>
